<script>
const texts = [
  "Denganmu ku mengerti arti cinta yang sesungguhnya. Cinta yang tumbuh tanpa syarat, tanpa batas, dan tanpa keraguan. Setiap detik bersamamu adalah pelajaran tentang kesabaran, keikhlasan, dan kebahagiaan yang sederhana namun bermakna. Aku belajar bahwa cinta bukan hanya tentang memiliki, tetapi juga tentang menjaga dan menghargai satu sama lain dalam setiap keadaan.",

  "Hidup adalah perjalanan panjang yang penuh dengan lika-liku dan tantangan yang tidak selalu mudah untuk dilalui. Namun dari setiap kegagalan, kita belajar menjadi lebih kuat dan bijaksana. Tidak ada usaha yang sia-sia selama kita terus melangkah dan tidak menyerah. Kesuksesan bukan tentang seberapa cepat kita sampai, tetapi seberapa konsisten kita berjalan menuju tujuan.",

  "Di dunia yang serba cepat ini, banyak orang lupa untuk berhenti sejenak dan menghargai apa yang sudah dimiliki. Padahal kebahagiaan sejati sering kali datang dari hal-hal kecil yang sederhana. Senyuman, waktu bersama keluarga, dan rasa syukur adalah kunci untuk menjalani hidup dengan lebih tenang dan bermakna.",

  "Kesuksesan bukanlah hasil dari keberuntungan semata, melainkan kombinasi antara kerja keras, disiplin, dan keberanian untuk mencoba hal baru. Banyak orang gagal bukan karena tidak mampu, tetapi karena terlalu cepat menyerah sebelum mencapai titik keberhasilan yang sebenarnya sudah sangat dekat.",

  "Waktu adalah sumber daya yang paling berharga dalam hidup ini karena tidak bisa diulang atau dibeli kembali. Setiap detik yang berlalu adalah kesempatan yang tidak akan pernah kembali. Oleh karena itu, gunakan waktumu dengan bijak untuk hal-hal yang benar-benar penting dan memberikan dampak positif.",

  "Dalam perjalanan hidup, kita akan bertemu dengan banyak orang yang datang dan pergi. Ada yang membawa kebahagiaan, ada pula yang meninggalkan pelajaran berharga. Semua itu adalah bagian dari proses yang membentuk kita menjadi pribadi yang lebih dewasa dan kuat.",

  "Jangan pernah takut untuk bermimpi besar, karena semua hal hebat di dunia ini berawal dari mimpi yang sederhana. Yang membedakan hanyalah keberanian untuk mengambil langkah pertama dan konsistensi untuk terus melangkah meskipun menghadapi berbagai rintangan.",

  "Fokus adalah kunci utama untuk mencapai tujuan. Ketika kita terlalu banyak terganggu oleh hal-hal yang tidak penting, maka kita akan kehilangan arah. Belajarlah untuk memprioritaskan apa yang benar-benar penting dan berani mengatakan tidak pada hal yang tidak mendukung tujuanmu.",

  "Perubahan adalah bagian yang tidak terpisahkan dari kehidupan. Tidak semua perubahan terasa nyaman, namun sering kali perubahan membawa kita ke arah yang lebih baik. Yang terpenting adalah bagaimana kita mampu beradaptasi dan tetap berpikir positif dalam setiap situasi.",

  "Keberhasilan sejati bukan hanya tentang pencapaian materi, tetapi juga tentang bagaimana kita bisa memberikan manfaat bagi orang lain. Ketika kita mampu membantu dan memberikan dampak positif, di situlah letak kebahagiaan yang sebenarnya."
];

let text = "";

let startTime, timer;

function renderText(input="") {
  let html = "";
  for (let i=0;i<text.length;i++) {
    if (i < input.length) {
      html += text[i] === input[i]
        ? `<span class="correct">${text[i]}</span>`
        : `<span class="wrong">${text[i]}</span>`;
    } else {
      html += text[i];
    }
  }
  document.getElementById("text").innerHTML = html;
}

function startGame() {
  document.getElementById("input").disabled = false;
  document.getElementById("input").value = "";
  document.getElementById("input").focus();
  renderText();

  startTime = new Date();

  let timeLeft = 60;
  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    moveBot("bot1", 0.6);
    moveBot("bot2", 0.5);

    if (timeLeft <= 0) {
      clearInterval(timer);
      alert("Waktu habis!");
    }
  },1000);
}

document.getElementById("input").addEventListener("input", function() {
  const val = this.value;

  renderText(val);

  let progress = val.length / text.length;
  document.getElementById("player").style.left = (progress * 90) + "%";

  let time = (new Date() - startTime)/60000;
  let cpm = Math.round(val.length / time);
  document.getElementById("cpm").innerText = cpm;

  if (val === text) {
  clearInterval(timer);
  new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg").play();
  alert("🏆 Kamu menang!");
}
});

function moveBot(id, speed) {
  let el = document.getElementById(id);
  let current = parseFloat(el.style.left) || 0;
  current += Math.random() * speed * 10;

  if (current > 90) current = 90;

  el.style.left = current + "%";
}

function getRandomText() {
  return texts[Math.floor(Math.random() * texts.length)];
}

function startGame() {
  text = getRandomText(); // 🔥 ambil text random

  document.getElementById("input").disabled = false;
  document.getElementById("input").value = "";
  document.getElementById("input").focus();

  renderText();

  startTime = new Date();

  let timeLeft = 60;
  clearInterval(timer); // reset timer lama

  timer = setInterval(()=>{
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    moveBot("bot1", 0.6);
    moveBot("bot2", 0.5);

    if (timeLeft <= 0) {
      clearInterval(timer);
      alert("Waktu habis!");
    }
  },1000);
}

function renderText(input="") {
  let html = "";
  for (let i=0;i<text.length;i++) {
    if (i < input.length) {
      html += text[i] === input[i]
        ? `<span class="correct">${text[i]}</span>`
        : `<span class="wrong">${text[i]}</span>`;
    } else {
      html += text[i];
    }
  }
  document.getElementById("text").innerHTML = html;
}

</script>
